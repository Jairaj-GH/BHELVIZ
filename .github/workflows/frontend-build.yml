name: Frontend CI - Build

on:
  workflow_dispatch: {}

jobs:
  build-frontend:
    name: Build Frontend and upload artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies
        run: |
          cd BHELVIZ_FULL/frontend
          npm ci

      - name: Build frontend
        run: |
          cd BHELVIZ_FULL/frontend
          npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: BHELVIZ_FULL/frontend/dist
